<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio | Chaiwatbank</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <link rel="icon" href="images/luxstone_logo.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <a href="index.html#home" class="logo-link">
        <img src="images/luxstone_logo.jpg" alt="Luxstone logo" class="logo" />
        <span class="logo-text">Luxstone</span>
      </a>
      <i class='bx bx-menu' id="menu-icon"></i>
      <nav class="navbar">
        <a href="index.html#home">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#services">My Skills</a>
        <a href="portfolio.html" class="active">Portfolio</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </header>

    <main class="portfolio-page">
      <div class="section-header">
        <h2 class="heading">Portfolio Gallery</h2>
        <p>ภาพผลงานจัดเรียงในการ์ด 3 คอลัมน์ เพื่อให้เลือกดูภาพสไตล์งานได้ง่าย</p>
      </div>

      <div class="portfolio-grid">
        <article class="project-card">
          <img src="images/product1.jpg" alt="Portfolio project 1" />
        </article>

        <article class="project-card">
          <img src="images/product2.jpg" alt="Portfolio project 2" />
        </article>

        <article class="project-card">
          <img src="images/product3.jpg" alt="Portfolio project 3" />
        </article>

        <article class="project-card">
          <img src="images/hex-purple.png" alt="Portfolio project 4" />
        </article>

        <article class="project-card">
          <img src="images/html.png" alt="Portfolio project 5" />
        </article>

        <article class="project-card">
          <img src="images/css.png" alt="Portfolio project 6" />
        </article>

        <article class="project-card">
          <img src="images/my-web.jpg" alt="Portfolio project 7" />
        </article>

        <article class="project-card">
          <img src="images/ToDoList.jpg" alt="Portfolio project 8" />
        </article>

        <article class="project-card">
          <img src="images/cleanbank.jpg" alt="Portfolio project 9" />
        </article>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-text">
        <p>Copyright &copy; 2024 by Chaiwatbank02</p>
      </div>
      <div class="footer-iconTop">
        <a href="index.html#home"><i class='bx bx-up-arrow-alt'></i></a>
      </div>
    </footer>

    <div class="portfolio-overlay" aria-hidden="true">
      <div class="portfolio-overlay-content" role="dialog" aria-modal="true">
        <button type="button" class="portfolio-overlay-close" aria-label="Close image preview">×</button>
        <img src="" alt="" />
        <p class="portfolio-overlay-caption"></p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="js/script.js"></script>
  </body>
</html>
